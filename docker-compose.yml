version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ats_postgres
    environment:
      POSTGRES_DB:       ats
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ats
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ats"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ats_backend
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:ats@postgres:5432/ats
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ats_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
